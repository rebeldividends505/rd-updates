<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Short-Signal System</title>
  <meta name="description" content="Tiered short-signal tracker for the AI semiconductor / memory / storage complex." />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .earnings-banner-wrap{max-width:1180px;margin:10px auto 0;padding:0 18px}
    .earnings-banner{
      background:rgba(255,138,61,.08);
      border:1px solid rgba(255,138,61,.4);
      border-left:3px solid #ff8a3d;
      color:#ff8a3d;
      font-family:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Monaco,"Cascadia Code",monospace;
      font-size:12px;font-weight:700;letter-spacing:.5px;
      padding:9px 14px;
      display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .eb-icon{font-size:15px;flex-shrink:0}
    .eb-main{font-size:12px;font-weight:800;letter-spacing:.8px}
    .eb-note{font-weight:400;font-size:11px;color:rgba(255,138,61,.7);letter-spacing:.3px}
    @media(max-width:720px){.earnings-banner-wrap{padding:0 12px}}
  </style>
</head>
<body>
  <div class="earnings-banner-wrap">
    <div class="earnings-banner">
      <span class="eb-icon">⚠</span>
      <span class="eb-main">NVDA REPORTS EARNINGS — May 21, 2026 · After Close</span>
      <span class="eb-note">Q1 FY27 · Watch: DC sequential growth + gross margin guide · Beat-and-fade on 4 of last 5</span>
    </div>
  </div>
  <div id="app"></div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
